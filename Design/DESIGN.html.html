<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; }

:root {
  --sky-top:    #c8e8f5;
  --sky-mid:    #e8f4fb;
  --sky-low:    #f5e8d0;
  --sand-light: #f2ddb8;
  --sand-mid:   #e5c98a;
  --rock-1:     #c9a96e;
  --rock-2:     #b08040;
  --dune-1:     #d4b87a;
  --dune-2:     #c4a05a;

  /* Glass system — iOS 26 Liquid Glass */
  --glass-white:      rgba(255,255,255,0.55);
  --glass-white-2:    rgba(255,255,255,0.72);
  --glass-white-3:    rgba(255,255,255,0.85);
  --glass-border:     rgba(255,255,255,0.80);
  --glass-border-sub: rgba(255,255,255,0.45);
  --glass-shadow:     0 4px 24px rgba(80,60,20,0.12), 0 1px 0 rgba(255,255,255,0.9) inset, 0 -1px 0 rgba(255,255,255,0.3) inset;
  --glass-shadow-lg:  0 8px 40px rgba(80,60,20,0.16), 0 1px 0 rgba(255,255,255,0.9) inset;
  --blur:             blur(28px) saturate(1.8) brightness(1.04);

  /* Text on glass */
  --ink:        rgba(30,20,10,0.88);
  --ink-2:      rgba(30,20,10,0.55);
  --ink-3:      rgba(30,20,10,0.35);
  --ink-teal:   oklch(42% 0.14 195);

  /* Accent */
  --accent:     oklch(58% 0.16 195);
  --accent-2:   oklch(65% 0.18 192);
  --accent-bg:  rgba(40,160,190,0.14);
  --coral:      oklch(62% 0.17 28);
  --coral-bg:   rgba(210,90,60,0.12);
  --gold:       oklch(65% 0.15 75);

  --font-sans:    'DM Sans', system-ui, sans-serif;
  --font-display: 'DM Serif Display', Georgia, serif;
}

html, body { font-family: var(--font-sans); }

/* Desktop centering */
body {
  display: flex; align-items: center; justify-content: center;
  background: #c0d8ee;
}

/* ── Desert landscape background ── */
#scene {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}

/* scrollbars */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(30,20,10,0.15); border-radius: 3px; }

/* ── Phone shell ── */
#root { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; }

.phone {
  position: relative;
  width: 390px; height: 844px;
  border-radius: 52px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.6),
    0 0 0 2.5px rgba(180,140,80,0.35),
    0 40px 80px rgba(80,60,20,0.28),
    0 12px 30px rgba(80,60,20,0.16);
  flex-shrink: 0;
}
/* dynamic island */
.phone::before {
  content:''; position:absolute; top:11px; left:50%; transform:translateX(-50%);
  width:118px; height:34px; border-radius:20px; background:#111; z-index:60;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
}
/* home indicator */
.phone::after {
  content:''; position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  width:130px; height:5px; border-radius:100px;
  background:rgba(30,20,10,0.22); z-index:60; pointer-events:none;
}
.phone-label {
  position:absolute; bottom:-32px; left:50%; transform:translateX(-50%);
  font-size:11px; font-weight:500; color:rgba(30,20,10,0.32);
  white-space:nowrap; letter-spacing:0.04em;
}

/* ── Animations ── */
@keyframes fadeIn   { from{opacity:0}            to{opacity:1} }
@keyframes slideUp  { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
@keyframes screenIn { from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:none} }
@keyframes shimmer  { from{background-position:-200% center} to{background-position:200% center} }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes cloudDrift { from{transform:translateX(-5px)} to{transform:translateX(5px)} }

.an-screen { animation:screenIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
.an-up     { animation:slideUp  0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
.an-fade   { animation:fadeIn 0.25s ease forwards; }
.an-pulse  { animation:pulse 1.6s ease infinite; }

@media (max-width:600px),(max-height:860px) {
  body { overflow:auto; }
  .phone { width:100vw; height:100dvh; border-radius:0; box-shadow:none; }
  .phone::before { display:none; }
  .phone-label { display:none; }
}
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Parallax on mouse move ────────────────────────────────────────────────────
(function(){
  const doc = document.getElementById('bg-svg');
  if(!doc) return;
  let ticking = false;
  document.addEventListener('mousemove', e => {
    if(ticking) return; ticking = true;
    requestAnimationFrame(() => {
      const dx = (e.clientX/window.innerWidth  - 0.5) * 1;
      const dy = (e.clientY/window.innerHeight - 0.5) * 1;
      const cloud1 = document.getElementById('cloud1');
      const cloud2 = document.getElementById('cloud2');
      const mid    = document.getElementById('dunes-mid');
      const fg     = document.getElementById('dunes-fg');
      const rocks  = document.getElementById('rocks');
      const sun    = document.getElementById('sun');
      if(cloud1) cloud1.style.transform = `translate(${dx*18}px,${dy*6}px)`;
      if(cloud2) cloud2.style.transform = `translate(${dx*10}px,${dy*4}px)`;
      if(mid)    mid.style.transform    = `translate(${dx*6}px,${dy*3}px)`;
      if(fg)     fg.style.transform     = `translate(${dx*12}px,${dy*5}px)`;
      if(rocks)  rocks.style.transform  = `translate(${dx*4}px,${dy*2}px)`;
      if(sun)    sun.style.transform    = `translate(${dx*8}px,${dy*5}px)`;
      ticking = false;
    });
  });
})();

// ── CATEGORIES ────────────────────────────────────────────────────────────────
const CATS = {

const AI_SUGG = [
  {id:'s1',name:'Alpaca Farm Mitzpe Ramon',category:'attraction',description:'A charming desert farm — perfect 45-min stop for the whole group.',duration:45,time:'15:00',distance:'2.1 km',open:true},
  {id:'s2',name:'Desert Bistro & Coffee',  category:'cafe',      description:'Acclaimed café with Bedouin coffee and a crater-view terrace.',  duration:60,time:'15:00',distance:'0.8 km',open:true},

  {id:'sp11',name:'Power bank',                category:'Gear',   checked:true },
  {id:'sp12',name:'Trash bags',                category:'Gear',   checked:false},

const toMins = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const toTime = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const fmtDate = (base,off) => { const d=new Date(base); d.setDate(d.getDate()+off); return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); };
const getGaps = evs => {
  if(!evs?.length) return [];
  const s=[...evs].sort((a,b)=>toMins(a.time)-toMins(b.time));
  const gaps=[]; let cur=8*60;
  for(const e of s){ const st=toMins(e.time); if(st-cur>=45) gaps.push({start:cur,end:st,duration:st-cur}); cur=Math.max(cur,st+e.duration); }
  if(20*60-cur>=45) gaps.push({start:cur,end:20*60,duration:20*60-cur});
  return gaps;
};

// ── iOS 26 LIQUID GLASS COMPONENTS ────────────────────────────────────────────

// Core glass surface
const Glass = ({children,level=1,style={},onClick,className=''}) => {
  const bgs = ['rgba(255,255,255,0.48)','rgba(255,255,255,0.64)','rgba(255,255,255,0.80)'];
  return (
    <div onClick={onClick} className={className} style={{
      background: bgs[level-1]||bgs[1],
      backdropFilter: T.blur, WebkitBackdropFilter: T.blur,
      border: `1px solid ${T.glassBorder}`,
      boxShadow: T.glassShadow,
      borderRadius: 18,
      ...style,
    }}>{children}</div>
  );
};

// iOS 26 glass button — capsule with specular shine
const GlassBtn = ({children,variant='default',size='md',onClick,disabled=false,style={}}) => {
  const [pressed,setPressed] = useState(false);
  const sizes = {sm:{h:32,px:14,fs:13}, md:{h:44,px:18,fs:15}, lg:{h:50,px:22,fs:16}};
  const sz = sizes[size]||sizes.md;

  let bg, color, border, shadow;
  if(variant==='accent'){
    bg = pressed ? 'rgba(30,145,175,0.82)' : 'rgba(30,145,175,0.72)';
    color = 'white'; border = '1px solid rgba(255,255,255,0.5)';
    shadow = '0 2px 12px rgba(30,145,175,0.30), 0 1px 0 rgba(255,255,255,0.4) inset';
  } else if(variant==='coral'){
    bg = pressed ? 'rgba(200,80,50,0.78)' : 'rgba(200,80,50,0.68)';
    color = 'white'; border = '1px solid rgba(255,255,255,0.4)';
    shadow = '0 2px 12px rgba(200,80,50,0.25), 0 1px 0 rgba(255,255,255,0.35) inset';
  } else if(variant==='danger'){
    bg = 'rgba(220,60,50,0.10)'; color = 'oklch(50% 0.16 22)';
    border = '1px solid rgba(220,60,50,0.22)'; shadow = 'none';
  } else {
    // default: white liquid glass
    bg = pressed ? 'rgba(255,255,255,0.78)' : T.glassMid;
    color = T.ink; border = `1px solid ${T.glassBorder}`;
    shadow = T.glassShadow;
  }

  return (
    <button onMouseDown={()=>setPressed(true)} onMouseUp={()=>setPressed(false)} onMouseLeave={()=>setPressed(false)}

      style={{
        height:sz.h, padding:`0 ${sz.px}px`, fontSize:sz.fs, fontFamily:T.font, fontWeight:600,
        cursor:disabled?'not-allowed':'pointer', border, borderRadius:9999, color,
        background:bg, backdropFilter:T.blur, WebkitBackdropFilter:T.blur,

        transition:'all 0.15s ease', opacity:disabled?0.45:1,
        transform: pressed?'scale(0.97)':'scale(1)',
        ...style,
      }}
    >{children}</button>
  );
};

// ── JOURNEY MAP (Dashboard) ───────────────────────────────────────────────────
function JourneyMap({days, currentDay, onDaySelect}) {
  // Render a top-down route with waypoints
  // Layout: horizontal scroll with a sinuous path connecting day pins
  const positions = [
    {x: 42,  y: 130},
    {x: 148, y: 76},
    {x: 254, y: 134},
    {x: 356, y: 78},
  ];

  return (
    <div style={{position:'relative',overflow:'hidden',borderRadius:20,marginBottom:16}}>
      <Glass level={2} style={{borderRadius:20,padding:'16px 14px 12px',overflow:'visible'}}>
        <p style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:T.ink3,marginBottom:12}}>Your Journey</p>

        {/* SVG route */}
        <div style={{position:'relative',height:190}}>
          <svg width="100%" height="190" viewBox="0 0 390 190" style={{position:'absolute',inset:0}}>
            {/* Dashed route line */}
            <path
              d={`M ${positions[0].x+18} ${positions[0].y+18} C ${positions[0].x+80} ${positions[0].y+18} ${positions[1].x-50} ${positions[1].y+18} ${positions[1].x+18} ${positions[1].y+18} C ${positions[1].x+80} ${positions[1].y+18} ${positions[2].x-50} ${positions[2].y+18} ${positions[2].x+18} ${positions[2].y+18} C ${positions[2].x+80} ${positions[2].y+18} ${positions[3].x-50} ${positions[3].y+18} ${positions[3].x+18} ${positions[3].y+18}`}
              fill="none" stroke="rgba(30,145,175,0.35)" strokeWidth="2.5"
              strokeDasharray="8 5" strokeLinecap="round"
            />
            {/* Completed segment */}
            <path
              d={`M ${positions[0].x+18} ${positions[0].y+18} C ${positions[0].x+80} ${positions[0].y+18} ${positions[1].x-50} ${positions[1].y+18} ${positions[1].x+18} ${positions[1].y+18}`}
              fill="none" stroke={T.accent} strokeWidth="2.5" strokeLinecap="round"
            />

            {/* Distance labels */}
            {[{x:90, y:85, txt:'~3h drive'},{x:196, y:135, txt:'~2h drive'},{x:300, y:82, txt:'~2.5h drive'}].map((l,i)=>(
              <text key={i} x={l.x} y={l.y} textAnchor="middle" fontSize="9" fill="rgba(28,18,8,0.38)" fontFamily={T.font} fontWeight="500">{l.txt}</text>
            ))}
          </svg>

          {/* Day waypoint cards */}
          {positions.map((pos, i) => {
            const d = i+1;
            const meta = TRIP.dayMeta[i];
            const evs = TRIP.events[d]||[];
            const isActive = d === currentDay;
            const isPast   = d < currentDay;
            return (
              <button key={d} onClick={()=>onDaySelect(d)}
                style={{
                  position:'absolute', left:pos.x, top:pos.y,
                  width:72, background:'none', border:'none', cursor:'pointer', padding:0,
                  display:'flex', flexDirection:'column', alignItems:'center', gap:5,
                  transform: isActive ? 'scale(1.08)' : 'scale(1)',
                  transition:'transform 0.2s ease',
                  zIndex: isActive ? 2 : 1,
                }}
              >
                {/* Pin bubble */}
                <div style={{
                  width:44, height:44, borderRadius:14,
                  background: isActive ? T.accent : isPast ? 'rgba(30,145,175,0.22)' : T.glassMid,
                  backdropFilter:T.blur, WebkitBackdropFilter:T.blur,
                  border: isActive ? '2px solid rgba(255,255,255,0.7)' : `1.5px solid ${T.glassBorder}`,
                  boxShadow: isActive ? `0 6px 20px rgba(30,145,175,0.35), ${T.glassShadow}` : T.glassShadow,
                  display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                  position:'relative',
                }}>
                  <span style={{fontSize:18,lineHeight:1}}>{meta.emoji}</span>
                  {isActive && (
                    <div style={{position:'absolute',top:-6,right:-6,width:16,height:16,borderRadius:'50%',background:T.coral,border:'2px solid white',fontSize:9,fontWeight:800,color:'white',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {d}
                    </div>
                  )}
                  {isPast && (
                    <div style={{position:'absolute',top:-4,right:-4,width:14,height:14,borderRadius:'50%',background:T.accent,border:'2px solid white',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Ic name="check" size={8} style={{color:'white'}}/>
                    </div>
                  )}
                </div>

                {/* Label */}
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:9,fontWeight:700,color: isActive ? T.accent : T.ink2, lineHeight:1.2, whiteSpace:'nowrap'}}>{meta.region}</div>
                  <div style={{fontSize:8,color:T.ink3}}>{evs.length} stops</div>
                </div>

                {/* Day number pill */}
                <Glass level={3} style={{borderRadius:100,padding:'2px 9px',border:`1px solid ${isActive ? 'rgba(30,145,175,0.4)' : T.glassBorderSub}`}}>
                  <span style={{fontSize:9,fontWeight:700,color: isActive ? T.accent : T.ink3}}>Day {d}</span>
                </Glass>
              </button>
            );
          })}
        </div>
      </Glass>
    </div>
  );
}

    pins: [{x:0.24,y:0.32,cat:'transport'},{x:0.44,y:0.28,cat:'attraction'},{x:0.62,y:0.44,cat:'food'}],
    route: '0.24,0.32 0.44,0.28 0.62,0.44',
    label:'Timna & Eilat',
  },
};

function DayMap({dayNum, events, style={}}) {
  const W=360, H=170;
  const cfg = DAY_MAP_CONFIG[dayNum] || DAY_MAP_CONFIG[1];
  const [hovered,setHovered] = useState(null);

  // Build route polyline points
  const routePts = cfg.pins.map(p=>`${p.x*W},${p.y*H}`).join(' ');

  // Terrain gradient stops
  const [c0,c1,c2,c3] = cfg.terrain;

  return (
    <div style={{position:'relative',overflow:'hidden',borderRadius:'0 0 0 0',...style}}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block'}} preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id={`dmg${dayNum}`} x1="0" y1="0" x2="0.4" y2="1">
            <stop offset="0%"   stopColor={c0}/>
            <stop offset="35%"  stopColor={c1}/>
            <stop offset="70%"  stopColor={c2}/>
            <stop offset="100%" stopColor={c3}/>
          </linearGradient>
          {/* subtle texture noise */}
          <filter id={`dmf${dayNum}`}>
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
            <feColorMatrix type="saturate" values="0.2" in="noise" result="colored"/>
            <feBlend in="SourceGraphic" in2="colored" mode="overlay" result="blend"/>
            <feComposite in="blend" in2="SourceGraphic" operator="in"/>
          </filter>
          <clipPath id={`dmc${dayNum}`}><rect width={W} height={H}/></clipPath>
        </defs>

        {/* Base terrain */}
        <rect width={W} height={H} fill={`url(#dmg${dayNum})`}/>
        <rect width={W} height={H} fill={`url(#dmg${dayNum})`} filter={`url(#dmf${dayNum})`} opacity="0.35"/>

        {/* Contour rings */}
        <ellipse cx={W*0.45} cy={H*0.6} rx={W*0.45} ry={H*0.35} fill="none" stroke={cfg.contourColor} strokeWidth="1"/>
        <ellipse cx={W*0.45} cy={H*0.6} rx={W*0.32} ry={H*0.24} fill="none" stroke={cfg.contourColor} strokeWidth="1"/>
        <ellipse cx={W*0.45} cy={H*0.6} rx={W*0.20} ry={H*0.14} fill="none" stroke={cfg.contourColor} strokeWidth="1"/>

        {/* Geographic feature */}
        <g dangerouslySetInnerHTML={{__html: cfg.feature(W,H)}}/>

        {/* Route line */}
        <polyline points={routePts} fill="none" stroke="rgba(30,145,175,0.55)" strokeWidth="2" strokeDasharray="7 4" strokeLinecap="round" strokeLinejoin="round"/>
        {/* Route glow */}
        <polyline points={routePts} fill="none" stroke="rgba(30,145,175,0.18)" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>

        {/* Event pins */}
        {cfg.pins.map((pin,i)=>{
          const cat = CATS[pin.cat]||CATS.other;
          const px=pin.x*W, py=pin.y*H;
          const isH = hovered===i;
          return (
            <g key={i} onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)} style={{cursor:'pointer'}}>
              {/* drop shadow */}
              <circle cx={px} cy={py+2} r={isH?14:11} fill="rgba(0,0,0,0.12)" opacity="0.6"/>
              {/* pin body */}
              <circle cx={px} cy={py} r={isH?14:11}
                fill="rgba(255,255,255,0.82)" stroke={cat.color} strokeWidth={isH?2.5:2}/>
              {/* icon as text */}
              <text x={px} y={py+5} textAnchor="middle" fontSize={isH?13:10}>{cat.icon}</text>
              {/* sequence number */}
              <circle cx={px+8} cy={py-8} r={5.5} fill={cat.color}/>
              <text x={px+8} y={py-5} textAnchor="middle" fontSize="7" fontWeight="700" fill="white" fontFamily={T.font}>{i+1}</text>
            </g>
          );
        })}

        {/* Compass rose */}
        <g transform={`translate(${W-22},22)`} opacity="0.45">
          <circle r="10" fill="rgba(255,255,255,0.55)" stroke="rgba(28,18,8,0.15)" strokeWidth="0.8"/>
          <text textAnchor="middle" y="-3" fontSize="6" fontWeight="700" fill="rgba(28,18,8,0.7)" fontFamily={T.font}>N</text>
          <line x1="0" y1="-7" x2="0" y2="7" stroke="rgba(28,18,8,0.3)" strokeWidth="0.8"/>
          <line x1="-7" y1="0" x2="7" y2="0" stroke="rgba(28,18,8,0.3)" strokeWidth="0.8"/>
        </g>

        {/* Scale bar */}
        <g transform={`translate(12,${H-14})`} opacity="0.5">
          <line x1="0" y1="0" x2="30" y2="0" stroke="rgba(28,18,8,0.5)" strokeWidth="1.5" strokeLinecap="round"/>
          <line x1="0" y1="-3" x2="0" y2="3" stroke="rgba(28,18,8,0.5)" strokeWidth="1.2"/>
          <line x1="30" y1="-3" x2="30" y2="3" stroke="rgba(28,18,8,0.5)" strokeWidth="1.2"/>
          <text x="15" y="-5" textAnchor="middle" fontSize="7" fill="rgba(28,18,8,0.55)" fontFamily={T.font}>5 km</text>
        </g>

        {/* Region label pill */}
        <g>
          <rect x="10" y="8" width="90" height="18" rx="9" fill="rgba(255,255,255,0.70)"/>
          <text x="55" y="20.5" textAnchor="middle" fontSize="9" fontWeight="600" fill={T.ink2} fontFamily={T.font}>{cfg.label}</text>
        </g>
      </svg>

      {/* Hover tooltip */}
      {hovered !== null && (
        <div className="an-fade" style={{
          position:'absolute', bottom:8, left:'50%', transform:'translateX(-50%)',
          background:'rgba(255,255,255,0.88)', backdropFilter:T.blur, WebkitBackdropFilter:T.blur,
          border:`1px solid ${T.glassBorder}`, borderRadius:10, padding:'4px 12px',
          fontSize:11, fontWeight:600, color:T.ink, whiteSpace:'nowrap', boxShadow:T.glassShadow,
          pointerEvents:'none',
        }}>
          {events?.[hovered]?.name || `Stop ${hovered+1}`}
        </div>
      )}
    </div>
  );
}

        </div>

            const gap=gaps.find(g=>g.start===prevEnd&&g.end===toMins(ev.time));
            return (
              <React.Fragment key={ev.id}>
                {gap && <GapBlock gap={gap} onSuggest={()=>{setActiveGap(gap);setShowAI(true);}}/>}
                <div className="an-up" style={{animationDelay:`${i*0.04}s`}}>
                  <EventCard event={ev} onDelete={delEvent} onEdit={()=>{}}/>
                </div>
              </React.Fragment>
            );
          })}
          {(()=>{
            if(!sorted.length)return null;
            const last=sorted[sorted.length-1];
            const le=toMins(last.time)+last.duration;
            const tg=gaps.find(g=>g.start===le);
            return tg?<GapBlock gap={tg} onSuggest={()=>{setActiveGap(tg);setShowAI(true);}}/>:null;
          })()}
          {events.length===0 && <div style={{textAlign:'center',padding:'40px 0',color:T.ink3,fontSize:13}}><div style={{fontSize:32,marginBottom:8}}>🏜️</div>No events yet — tap Add to start</div>}
        </div>
      </div>

      {showAdd && <AddEventModal onAdd={addEvent} onClose={()=>setShowAdd(false)}/>}
      {showAI  && <AIPanel gap={activeGap} onAdd={addSugg} onClose={()=>setShowAI(false)}/>}
      {toastEl}
    </div>
  );
}

// ── CALENDAR EXPORT ───────────────────────────────────────────────────────────
function buildICS() {
  const lines = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Trippy//Desert Trip Planner//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',
  ];
  for(const [dayStr, evs] of Object.entries(TRIP.events)) {
    const dayIdx = parseInt(dayStr)-1;
    const base = new Date(TRIP.startDate);
    base.setDate(base.getDate()+dayIdx);
    const ymd = base.toISOString().slice(0,10).replace(/-/g,'');
    for(const ev of evs) {
      const [h,m] = ev.time.split(':');
      const endMins = toMins(ev.time)+ev.duration;
      const eh = String(Math.floor(endMins/60)).padStart(2,'0');
      const em = String(endMins%60).padStart(2,'0');
      const uid = `${ev.id}@trippy.app`;
      lines.push(
        'BEGIN:VEVENT',
        `UID:${uid}`,
        `DTSTART:${ymd}T${h}${m}00`,
        `DTEND:${ymd}T${eh}${em}00`,
        `SUMMARY:${ev.name}`,
        ev.location?`LOCATION:${ev.location}`:'',
        ev.notes?`DESCRIPTION:${ev.notes}`:'',
        'END:VEVENT',
      );
    }
  }
  lines.push('END:VCALENDAR');
  return lines.filter(Boolean).join('\r\n');
}

function exportCalendar(type, label) {
  const ics = buildICS();
  const blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  if(type==='google') {
    // For Google, open first event; real integration would use Google Calendar API
    const a=document.createElement('a'); a.href=url; a.download='trippy-negev.ics'; a.click(); URL.revokeObjectURL(url);
  } else {
    const a=document.createElement('a'); a.href=url; a.download='trippy-negev.ics'; a.click(); URL.revokeObjectURL(url);
  }
}

      {tweaksVisible && (
